<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DreamsLMS Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #fff;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .left, .right {
      flex: 1;
      min-width: 300px;
      padding: 40px;
    }

    .left {
      background-color: #ffeef0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .left img {
      max-width: 80%;
      margin-bottom: 30px;
    }

    .left h2 {
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 10px;
    }

    .left p {
      text-align: center;
      color: #555;
      max-width: 300px;
      font-size: 14px;
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .back-link {
      color: #ff4d6d;
      font-size: 14px;
      text-align: right;
      margin-bottom: 20px;
      text-decoration: none;
      display: block;
    }

    h2.title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 40px 12px 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      right: 15px;
      top: 13px;
      color: #aaa;
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .form-footer a {
      color: #ff4d6d;
      text-decoration: none;
    }

    button.login-btn {
      background-color: #ff4d6d;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 14px;
      color: #888;
    }

    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .social-buttons button {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #ccc;
      border-radius: 30px;
      padding: 10px 20px;
      cursor: pointer;
      background: white;
      font-size: 14px;
    }

    .social-buttons img {
      width: 20px;
    }

    .signup-text {
      text-align: center;
      font-size: 14px;
    }

    .signup-text a {
      color: #ff4d6d;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .left, .right {
        padding: 20px;
      }
      .left img {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Left Side -->
    <div class="left">
      <img src="/static/images/sign in.svg" alt="Welcome Image" />
      <h2>Welcome to <br><span style="color: #ff4d6d;">eLearning</span> Courses.</h2>
      <p>Platform designed to help organizations, educators, and learners manage, deliver, and track learning and training activities.</p>
    </div>

    <!-- Right Side -->
    <div class="right">
      <a href="/" class="back-link">← Back to Home</a>
      <h2 class="title">Sign into Your Account</h2>

      <form action="/admin" method="POST">
        {% csrf_token %}
        <!-- Email -->
        <div>
          <label>Email <span style="color: red;">*</span></label>
          <div class="input-wrapper">
            <input type="email" name="email" placeholder="Enter your email" required />
            <i class="fa fa-envelope"></i>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label>Password <span style="color: red;">*</span></label>
          <div class="input-wrapper">
            <input type="password" name="password" placeholder="Enter your password" required />
            <i class="fa fa-eye-slash"></i>
          </div>
        </div>

        <!-- Footer -->
        <div class="form-footer">
          <label><input type="checkbox" /> Remember Me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn">
          Login <i class="fa fa-arrow-right" style="margin-left: 8px;"></i>
        </button>

        <!-- Divider -->
        <div class="divider">OR</div>

        <!-- Social Logins -->
        <div class="social-buttons">
          <button type="button">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" /> Google
          </button>
          <button type="button">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" /> Facebook
          </button>
        </div>

        <!-- Sign up -->
        <p class="signup-text">Don’t have an account? <a href="/register">Sign up</a></p>
      </form>
    </div>
  </div>

</body>
</html>
