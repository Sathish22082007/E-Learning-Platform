<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - DreamsLMS</title>
</head>
<body style="font-family:'Segoe UI', sans-serif; margin:0; background-color:#f8f9fa;">

  <!-- Header -->
  <div style="background-color:#0d6efd; padding:30px; color:white; text-align:center;">
    <h1 style="margin:0; font-size:30px;">Checkout</h1>
    <p style="margin:5px 0 0;">Complete your enrollment</p>
  </div>

  <!-- Checkout Form -->
  <form method="POST" action="/checkout/{{ course.id }}/" style="max-width:1000px; margin:30px auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.05);">
    {% csrf_token %}
   
    <!-- Billing Info -->
    <h2 style="margin-bottom:15px; color:#333;">Billing Details</h2>
    <div style="display:flex; flex-wrap:wrap; gap:20px;">
      <div style="flex:1; min-width:300px;">
        <label>Full Name</label><br>
        <input type="text" name="full_name" placeholder="John Doe" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
      <div style="flex:1; min-width:300px;">
        <label>Email</label><br>
        <input type="email" name="email" placeholder="john@example.com" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
      <div style="flex:1; min-width:300px;">
        <label>Phone Number</label><br>
        <input type="text" name="phone" placeholder="+91 9876543210" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
      <div style="flex:1; min-width:300px;">
        <label>Country</label><br>
        <input type="text" name="country" placeholder="India" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
      <div style="flex:1; min-width:300px;">
        <label>State</label><br>
        <input type="text" name="state" placeholder="Tamil Nadu" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
      <div style="flex:1; min-width:300px;">
        <label>Zip Code</label><br>
        <input type="text" name="zip_code" placeholder="600001" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
    </div>

    <div style="margin-top:20px;">
      <label>Full Address</label><br>
      <input type="text" name="address" placeholder="123 Main Street, Area, City" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
    </div>

    <!-- Course Summary -->
    <h2 style="margin:30px 0 15px; color:#333;">Course Summary</h2>
    <div style="background-color:#f1f1f1; padding:20px; border-radius:8px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
       <span>{{ course.course_name }}</span>
<span>
  {% if course.course_price == "0" or course.course_price|lower == "free" %}
    FREE
  {% else %}
    ₹{{ course.course_price }}
  {% endif %}
</span>
      </div>
    </div>

    <!-- Payment Method -->
    <h2 style="margin:30px 0 15px; color:#333;">Payment Method</h2>

    <!-- Card Payment -->
    <div style="margin-bottom:20px;">
      <label><input type="radio" name="payment_method" value="card" checked> Credit / Debit Card</label>
      <div style="margin-left:20px; display:flex; flex-wrap:wrap; gap:20px; margin-top:10px;">
        <div style="flex:1; min-width:300px;">
          <label>Card Number</label><br>
          <input type="text" name="card_number" placeholder="1234 5678 9012 3456" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
        </div>
        <div style="flex:1; min-width:140px;">
          <label>Expiry Date</label><br>
          <input type="text" name="expiry" placeholder="MM/YY" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
        </div>
        <div style="flex:1; min-width:140px;">
          <label>CVV</label><br>
          <input type="text" name="cvv" placeholder="123" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
        </div>
      </div>
    </div>

    <!-- UPI -->
    <div style="margin-bottom:20px;">
      <label><input type="radio" name="payment_method" value="upi"> UPI</label>
      <div style="margin-left:20px; margin-top:10px;">
        <label>UPI ID</label><br>
        <input type="text" name="upi_id" placeholder="yourname@upi" style="width:300px; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
    </div>

    <!-- Net Banking -->
    <div style="margin-bottom:20px;">
      <label><input type="radio" name="payment_method" value="netbanking"> Net Banking</label>
      <div style="margin-left:20px; margin-top:10px;">
        <label>Bank Name</label><br>
        <select name="bank_name" style="width:300px; padding:10px; border:1px solid #ccc; border-radius:5px;">
          <option value="">Select Bank</option>
          <option value="sbi">SBI</option>
          <option value="hdfc">HDFC Bank</option>
          <option value="icici">ICICI Bank</option>
          <option value="axis">Axis Bank</option>
        </select>
        <br><br>
        <label>Account Number</label><br>
        <input type="text" name="account_number" placeholder="XXXXXXXXXXXX" style="width:300px; padding:10px; border:1px solid #ccc; border-radius:5px;">
      </div>
    </div>

    <!-- Submit -->
    <div style="margin-top:30px; text-align:right;">
      <button type="submit">
  {% if course.course_price == "0" or course.course_price|lower == "free" %}
    Confirm Enrollment
  {% else %}
    Confirm & Pay ₹{{ course.course_price }}
  {% endif %}
</button>
    </div>

  </form>

</body>
</html>
